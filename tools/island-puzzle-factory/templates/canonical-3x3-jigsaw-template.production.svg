<svg xmlns="http://www.w3.org/2000/svg" width="900" height="900" viewBox="0 0 900 900" role="img" aria-label="Production canonical 3 by 3 rounded jigsaw mask template for Island Puzzle Factory" shape-rendering="crispEdges">
  <title>Production Canonical 3x3 Rounded Jigsaw Template</title>
  <desc>Production geometry template only. The nine directly named path elements partition the rounded 900 by 900 puzzle silhouette exactly once for deterministic full-canvas mask export.</desc>
  <metadata>
    Island Puzzle Factory production template. Geometry authority only; no artwork is generated or embedded. Piece ids map to mask_01 through mask_09 in top-left to bottom-right order. The template uses a soft rounded outer silhouette and mirrored pixel-locked jigsaw tabs/holes so mask QC can prove exact single coverage of the approved puzzle silhouette.
  </metadata>
