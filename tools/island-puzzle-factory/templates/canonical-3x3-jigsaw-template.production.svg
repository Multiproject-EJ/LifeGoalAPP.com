  <title>Production Canonical 3x3 Jigsaw Template</title>
  <desc>Production geometry template only. The nine directly named path elements partition the 900 by 900 puzzle canvas exactly once for deterministic full-canvas mask export.</desc>
  <metadata>
    Island Puzzle Factory production template. Geometry authority only; no artwork is generated or embedded. Piece ids map to mask_01 through mask_09 in top-left to bottom-right order. The template uses pixel-aligned stepped jigsaw tab geometry so mask QC can prove exact single coverage on the full 900 by 900 canvas.
  </metadata>
