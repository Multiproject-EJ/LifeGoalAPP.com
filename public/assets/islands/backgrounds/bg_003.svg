<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 900" preserveAspectRatio="xMidYMid slice">
  <defs>
    <!-- Scene 3: Mystical purple/teal — twilight + glowing flora -->
    <radialGradient id="s3-sky" cx="52%" cy="28%" r="70%">
      <stop offset="0%" stop-color="#63cbdb"/>
      <stop offset="28%" stop-color="#4394c2"/>
      <stop offset="58%" stop-color="#5a6898"/>
      <stop offset="100%" stop-color="#2f2135"/>
    </radialGradient>
    <radialGradient id="s3-ground" cx="50%" cy="100%" r="72%">
      <stop offset="0%" stop-color="#6f8b7f"/>
      <stop offset="30%" stop-color="#67546f"/>
      <stop offset="65%" stop-color="#4a3855"/>
      <stop offset="100%" stop-color="#2f2135"/>
    </radialGradient>
    <radialGradient id="s3-pool" cx="50%" cy="50%" r="52%">
      <stop offset="0%" stop-color="#5ac8c8" stop-opacity="0.88"/>
      <stop offset="50%" stop-color="#3a8888" stop-opacity="0.85"/>
      <stop offset="100%" stop-color="#1e5060" stop-opacity="0.82"/>
    </radialGradient>
    <radialGradient id="s3-pool-glow" cx="42%" cy="40%" r="38%">
      <stop offset="0%" stop-color="#90e8e8" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#5ac8c8" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="s3-glow-center" cx="50%" cy="44%" r="42%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <!-- Mystic bloom glows -->
    <radialGradient id="s3-bloom1" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#c060e0" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#c060e0" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="s3-bloom2" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#40d0d0" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#40d0d0" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="s3-stars" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#e8f0ff" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#e8f0ff" stop-opacity="0"/>
    </radialGradient>
    <filter id="blur-soft3">
      <feGaussianBlur stdDeviation="8"/>
    </filter>
    <filter id="blur-glow">
      <feGaussianBlur stdDeviation="4"/>
    </filter>
    <filter id="blur-stars">
      <feGaussianBlur stdDeviation="1.5"/>
    </filter>
  </defs>

  <!-- Sky -->
  <rect width="800" height="900" fill="url(#s3-sky)"/>

  <!-- Ground base -->
  <rect width="800" height="900" fill="url(#s3-ground)" opacity="0.7"/>

  <!-- Twilight stars (small dots in upper sky) -->
  <circle cx="90" cy="80" r="1.5" fill="#e8f0ff" opacity="0.7"/>
  <circle cx="140" cy="55" r="1" fill="#e8f0ff" opacity="0.65"/>
  <circle cx="200" cy="95" r="1.5" fill="#e8f0ff" opacity="0.72"/>
  <circle cx="270" cy="40" r="1" fill="#e8f0ff" opacity="0.6"/>
  <circle cx="340" cy="70" r="2" fill="#e8f0ff" opacity="0.68"/>
  <circle cx="420" cy="48" r="1.5" fill="#e8f0ff" opacity="0.7"/>
  <circle cx="500" cy="88" r="1" fill="#e8f0ff" opacity="0.65"/>
  <circle cx="570" cy="52" r="2" fill="#e8f0ff" opacity="0.7"/>
  <circle cx="640" cy="78" r="1.5" fill="#e8f0ff" opacity="0.68"/>
  <circle cx="700" cy="45" r="1" fill="#e8f0ff" opacity="0.6"/>
  <circle cx="760" cy="92" r="1.5" fill="#e8f0ff" opacity="0.72"/>
  <circle cx="180" cy="128" r="1" fill="#e8f0ff" opacity="0.5"/>
  <circle cx="460" cy="118" r="1.5" fill="#e8f0ff" opacity="0.55"/>
  <circle cx="620" cy="130" r="1" fill="#e8f0ff" opacity="0.5"/>

  <!-- Distant mystical mountains -->
  <ellipse cx="160" cy="455" rx="270" ry="108" fill="#45356a" opacity="0.58" filter="url(#blur-soft3)"/>
  <ellipse cx="640" cy="460" rx="255" ry="102" fill="#3e2e62" opacity="0.55" filter="url(#blur-soft3)"/>
  <ellipse cx="400" cy="440" rx="330" ry="118" fill="#4e3e78" opacity="0.46" filter="url(#blur-soft3)"/>

  <!-- Bloom glows on mountains (atmospheric haze) -->
  <ellipse cx="200" cy="440" rx="150" ry="80" fill="url(#s3-bloom1)" filter="url(#blur-soft3)" opacity="0.7"/>
  <ellipse cx="600" cy="448" rx="140" ry="75" fill="url(#s3-bloom2)" filter="url(#blur-soft3)" opacity="0.65"/>

  <!-- Ground terrain -->
  <ellipse cx="400" cy="825" rx="490" ry="205" fill="#2f2135"/>
  <ellipse cx="145" cy="788" rx="228" ry="144" fill="#3a2848"/>
  <ellipse cx="658" cy="793" rx="215" ry="134" fill="#382548"/>

  <!-- Mystic glowing pool -->
  <ellipse cx="400" cy="560" rx="192" ry="96" fill="url(#s3-pool)"/>
  <ellipse cx="400" cy="560" rx="192" ry="96" fill="url(#s3-pool-glow)"/>
  <!-- Glow halo around pool -->
  <ellipse cx="400" cy="560" rx="220" ry="112" fill="none" stroke="rgba(90,200,200,0.22)" stroke-width="8" filter="url(#blur-glow)"/>
  <!-- Pool shimmer rings -->
  <ellipse cx="400" cy="557" rx="140" ry="65" fill="none" stroke="rgba(140,220,220,0.28)" stroke-width="2"/>
  <ellipse cx="400" cy="557" rx="95" ry="44" fill="none" stroke="rgba(140,220,220,0.22)" stroke-width="1.5"/>
  <ellipse cx="400" cy="557" rx="55" ry="26" fill="none" stroke="rgba(140,220,220,0.18)" stroke-width="1"/>
  <!-- Glowing lily pads -->
  <ellipse cx="342" cy="550" rx="19" ry="10" fill="#2a6e5e" opacity="0.85"/>
  <ellipse cx="342" cy="550" rx="16" ry="8" fill="none" stroke="rgba(60,200,180,0.5)" stroke-width="1.5"/>
  <ellipse cx="465" cy="572" rx="15" ry="8" fill="#2a6e5e" opacity="0.8"/>
  <ellipse cx="465" cy="572" rx="12" ry="6" fill="none" stroke="rgba(60,200,180,0.45)" stroke-width="1.5"/>

  <!-- Mystical trees / spire trees - left -->
  <!-- Spire tree 1 trunk -->
  <rect x="74" y="480" width="10" height="185" rx="4" fill="#3a2e50" opacity="0.92"/>
  <!-- Spire tree 1 layers (tapered upward) -->
  <ellipse cx="79" cy="475" rx="48" ry="42" fill="#3a2858" opacity="0.82"/>
  <ellipse cx="79" cy="452" rx="38" ry="35" fill="#4a3870" opacity="0.85"/>
  <ellipse cx="79" cy="432" rx="30" ry="28" fill="#5a4888" opacity="0.82"/>
  <ellipse cx="79" cy="414" rx="22" ry="20" fill="#6a58a0" opacity="0.8"/>
  <ellipse cx="79" cy="398" rx="14" ry="12" fill="#7a68b8" opacity="0.78"/>
  <!-- Mystic glow on tree 1 -->
  <ellipse cx="79" cy="430" rx="35" ry="30" fill="#c060e0" opacity="0.14" filter="url(#blur-glow)"/>

  <!-- Spire tree 2 trunk -->
  <rect x="164" y="510" width="9" height="158" rx="4" fill="#3a2e50" opacity="0.9"/>
  <ellipse cx="168" cy="506" rx="40" ry="36" fill="#382658" opacity="0.8"/>
  <ellipse cx="168" cy="486" rx="32" ry="29" fill="#484070" opacity="0.83"/>
  <ellipse cx="168" cy="468" rx="25" ry="23" fill="#566088" opacity="0.8"/>
  <ellipse cx="168" cy="452" rx="18" ry="16" fill="#6470a0" opacity="0.78"/>
  <ellipse cx="168" cy="438" rx="12" ry="10" fill="#7280b8" opacity="0.75"/>
  <ellipse cx="168" cy="468" rx="28" ry="25" fill="#8040d0" opacity="0.12" filter="url(#blur-glow)"/>

  <!-- Mystical trees - right -->
  <!-- Spire tree 3 trunk -->
  <rect x="718" y="476" width="10" height="188" rx="4" fill="#3a2e50" opacity="0.92"/>
  <ellipse cx="723" cy="472" rx="48" ry="42" fill="#3a2858" opacity="0.82"/>
  <ellipse cx="723" cy="449" rx="38" ry="35" fill="#4a3870" opacity="0.85"/>
  <ellipse cx="723" cy="429" rx="30" ry="28" fill="#5a4888" opacity="0.82"/>
  <ellipse cx="723" cy="411" rx="22" ry="20" fill="#6a58a0" opacity="0.8"/>
  <ellipse cx="723" cy="395" rx="14" ry="12" fill="#7a68b8" opacity="0.78"/>
  <ellipse cx="723" cy="426" rx="35" ry="30" fill="#40d0d0" opacity="0.14" filter="url(#blur-glow)"/>

  <!-- Spire tree 4 trunk -->
  <rect x="630" y="508" width="9" height="160" rx="4" fill="#3a2e50" opacity="0.9"/>
  <ellipse cx="634" cy="504" rx="40" ry="36" fill="#382658" opacity="0.8"/>
  <ellipse cx="634" cy="484" rx="32" ry="29" fill="#484070" opacity="0.83"/>
  <ellipse cx="634" cy="466" rx="25" ry="23" fill="#566088" opacity="0.8"/>
  <ellipse cx="634" cy="450" rx="18" ry="16" fill="#6470a0" opacity="0.78"/>
  <ellipse cx="634" cy="436" rx="12" ry="10" fill="#7280b8" opacity="0.75"/>
  <ellipse cx="634" cy="466" rx="28" ry="25" fill="#40b0d0" opacity="0.12" filter="url(#blur-glow)"/>

  <!-- Glowing flora — left ground clusters -->
  <ellipse cx="55" cy="710" rx="80" ry="46" fill="#2a2045" opacity="0.88"/>
  <ellipse cx="35" cy="692" rx="56" ry="36" fill="#342856" opacity="0.85"/>
  <!-- Glow blooms left -->
  <ellipse cx="48" cy="680" rx="22" ry="22" fill="#c060e0" opacity="0.28" filter="url(#blur-glow)"/>
  <ellipse cx="78" cy="672" rx="18" ry="18" fill="#40d8d8" opacity="0.25" filter="url(#blur-glow)"/>
  <!-- Glowing flower stems -->
  <line x1="50" y1="690" x2="40" y2="658" stroke="#c080e8" stroke-width="2" opacity="0.65"/>
  <circle cx="40" cy="655" r="5" fill="#d090f0" opacity="0.82"/>
  <circle cx="40" cy="655" r="8" fill="#c060e0" opacity="0.35" filter="url(#blur-glow)"/>
  <line x1="68" y1="685" x2="72" y2="650" stroke="#40d0d0" stroke-width="2" opacity="0.65"/>
  <circle cx="72" cy="647" r="5" fill="#50e0e0" opacity="0.82"/>
  <circle cx="72" cy="647" r="8" fill="#30c0c0" opacity="0.35" filter="url(#blur-glow)"/>
  <line x1="36" y1="682" x2="20" y2="652" stroke="#c080e8" stroke-width="2" opacity="0.6"/>
  <circle cx="20" cy="649" r="4" fill="#d090f0" opacity="0.75"/>

  <!-- Glowing flora — right ground clusters -->
  <ellipse cx="748" cy="706" rx="78" ry="44" fill="#2a2045" opacity="0.88"/>
  <ellipse cx="770" cy="690" rx="54" ry="34" fill="#342856" opacity="0.85"/>
  <!-- Glow blooms right -->
  <ellipse cx="756" cy="678" rx="22" ry="22" fill="#40d8d8" opacity="0.28" filter="url(#blur-glow)"/>
  <ellipse cx="728" cy="670" rx="18" ry="18" fill="#c060e0" opacity="0.25" filter="url(#blur-glow)"/>
  <!-- Right glowing flower stems -->
  <line x1="754" y1="688" x2="764" y2="656" stroke="#40d0d0" stroke-width="2" opacity="0.65"/>
  <circle cx="764" cy="653" r="5" fill="#50e0e0" opacity="0.82"/>
  <circle cx="764" cy="653" r="8" fill="#30c0c0" opacity="0.35" filter="url(#blur-glow)"/>
  <line x1="736" y1="683" x2="728" y2="648" stroke="#c080e8" stroke-width="2" opacity="0.65"/>
  <circle cx="728" cy="645" r="5" fill="#d090f0" opacity="0.82"/>
  <circle cx="728" cy="645" r="8" fill="#c060e0" opacity="0.35" filter="url(#blur-glow)"/>
  <line x1="768" y1="680" x2="784" y2="650" stroke="#40d0d0" stroke-width="2" opacity="0.6"/>
  <circle cx="784" cy="647" r="4" fill="#50e0e0" opacity="0.75"/>

  <!-- Mystical rocks with glow -->
  <ellipse cx="280" cy="640" rx="28" ry="18" fill="#4a3860" opacity="0.78"/>
  <ellipse cx="300" cy="652" rx="20" ry="13" fill="#584870" opacity="0.72"/>
  <ellipse cx="268" cy="650" rx="16" ry="10" fill="#403058" opacity="0.7"/>
  <!-- Glow on rocks -->
  <ellipse cx="280" cy="645" rx="30" ry="20" fill="#8040d0" opacity="0.18" filter="url(#blur-glow)"/>
  <ellipse cx="520" cy="638" rx="26" ry="16" fill="#4a3860" opacity="0.76"/>
  <ellipse cx="540" cy="650" rx="18" ry="11" fill="#584870" opacity="0.7"/>
  <ellipse cx="512" cy="648" rx="14" ry="9" fill="#403058" opacity="0.68"/>
  <ellipse cx="520" cy="643" rx="28" ry="18" fill="#40a0d0" opacity="0.16" filter="url(#blur-glow)"/>

  <!-- Atmospheric bottom haze -->
  <rect x="0" y="752" width="800" height="148" fill="#2f2135" opacity="0.44"/>

  <!-- Center glow overlay -->
  <rect width="800" height="900" fill="url(#s3-glow-center)"/>
</svg>
