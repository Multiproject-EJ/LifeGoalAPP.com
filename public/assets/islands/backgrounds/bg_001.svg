<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 900" preserveAspectRatio="xMidYMid slice">
  <defs>
    <!-- Scene 1: Tropical green/teal — pond + lush vegetation -->
    <radialGradient id="s1-sky" cx="50%" cy="30%" r="70%">
      <stop offset="0%" stop-color="#7be3e3"/>
      <stop offset="35%" stop-color="#57c7c7"/>
      <stop offset="70%" stop-color="#3da0a0"/>
      <stop offset="100%" stop-color="#2a7a7a"/>
    </radialGradient>
    <radialGradient id="s1-ground" cx="50%" cy="100%" r="75%">
      <stop offset="0%" stop-color="#4f8f63"/>
      <stop offset="40%" stop-color="#426742"/>
      <stop offset="80%" stop-color="#2f4e30"/>
      <stop offset="100%" stop-color="#1e3320"/>
    </radialGradient>
    <radialGradient id="s1-pond" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#5dcbcb" stop-opacity="0.9"/>
      <stop offset="60%" stop-color="#3a9898" stop-opacity="0.85"/>
      <stop offset="100%" stop-color="#246060" stop-opacity="0.8"/>
    </radialGradient>
    <radialGradient id="s1-pond-sheen" cx="38%" cy="38%" r="35%">
      <stop offset="0%" stop-color="#a8f0f0" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#5dcbcb" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="s1-glow-center" cx="50%" cy="44%" r="40%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.13"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <filter id="blur-soft">
      <feGaussianBlur stdDeviation="6"/>
    </filter>
    <filter id="blur-light">
      <feGaussianBlur stdDeviation="3"/>
    </filter>
  </defs>

  <!-- Sky gradient background -->
  <rect width="800" height="900" fill="url(#s1-sky)"/>

  <!-- Atmospheric haze layer -->
  <rect width="800" height="900" fill="url(#s1-ground)" opacity="0.7"/>

  <!-- Distant misty hills -->
  <ellipse cx="140" cy="480" rx="260" ry="120" fill="#3d7050" opacity="0.55" filter="url(#blur-soft)"/>
  <ellipse cx="660" cy="490" rx="240" ry="110" fill="#395e44" opacity="0.52" filter="url(#blur-soft)"/>
  <ellipse cx="400" cy="460" rx="310" ry="130" fill="#4a7a58" opacity="0.45" filter="url(#blur-soft)"/>

  <!-- Ground terrain base -->
  <ellipse cx="400" cy="820" rx="480" ry="200" fill="#2f4e30"/>
  <ellipse cx="150" cy="780" rx="220" ry="140" fill="#3a5e3c"/>
  <ellipse cx="650" cy="790" rx="210" ry="130" fill="#374f39"/>

  <!-- Central pond / water body -->
  <ellipse cx="400" cy="560" rx="200" ry="100" fill="url(#s1-pond)"/>
  <ellipse cx="400" cy="560" rx="200" ry="100" fill="url(#s1-pond-sheen)"/>
  <!-- Pond ripple rings -->
  <ellipse cx="400" cy="555" rx="145" ry="68" fill="none" stroke="rgba(180,240,240,0.25)" stroke-width="2"/>
  <ellipse cx="400" cy="555" rx="100" ry="46" fill="none" stroke="rgba(180,240,240,0.18)" stroke-width="1.5"/>
  <ellipse cx="400" cy="555" rx="60" ry="28" fill="none" stroke="rgba(180,240,240,0.14)" stroke-width="1"/>

  <!-- Lily pads on pond -->
  <ellipse cx="340" cy="548" rx="20" ry="11" fill="#3a8050" opacity="0.8"/>
  <ellipse cx="468" cy="570" rx="15" ry="8" fill="#3a8050" opacity="0.75"/>
  <ellipse cx="390" cy="580" rx="12" ry="6" fill="#2e6640" opacity="0.7"/>
  <ellipse cx="430" cy="540" rx="10" ry="5" fill="#4a9060" opacity="0.65"/>

  <!-- Large tropical trees - left cluster -->
  <!-- Tree 1 trunk -->
  <rect x="78" y="540" width="14" height="120" rx="5" fill="#5a3a1a" opacity="0.9"/>
  <!-- Tree 1 canopy layers -->
  <ellipse cx="85" cy="490" rx="70" ry="65" fill="#2a6e3c" opacity="0.85"/>
  <ellipse cx="85" cy="465" rx="55" ry="52" fill="#348a4a" opacity="0.88"/>
  <ellipse cx="75" cy="445" rx="40" ry="36" fill="#3da058" opacity="0.82"/>
  <ellipse cx="98" cy="450" rx="34" ry="30" fill="#45b460" opacity="0.8"/>
  <!-- Tree highlight -->
  <ellipse cx="68" cy="448" rx="22" ry="18" fill="#60c870" opacity="0.38"/>

  <!-- Tree 2 trunk -->
  <rect x="168" y="560" width="12" height="100" rx="4" fill="#4e3018" opacity="0.88"/>
  <!-- Tree 2 canopy -->
  <ellipse cx="174" cy="510" rx="58" ry="55" fill="#2d7040" opacity="0.82"/>
  <ellipse cx="174" cy="488" rx="46" ry="44" fill="#389850" opacity="0.85"/>
  <ellipse cx="162" cy="472" rx="34" ry="30" fill="#42ac5c" opacity="0.8"/>
  <ellipse cx="185" cy="478" rx="28" ry="24" fill="#50c068" opacity="0.75"/>

  <!-- Large tropical trees - right cluster -->
  <!-- Tree 3 trunk -->
  <rect x="622" y="545" width="15" height="115" rx="5" fill="#5a3a1a" opacity="0.9"/>
  <!-- Tree 3 canopy -->
  <ellipse cx="630" cy="492" rx="72" ry="68" fill="#296838" opacity="0.85"/>
  <ellipse cx="630" cy="468" rx="58" ry="54" fill="#338646" opacity="0.88"/>
  <ellipse cx="618" cy="448" rx="42" ry="38" fill="#3c9c52" opacity="0.82"/>
  <ellipse cx="642" cy="454" rx="36" ry="32" fill="#44b05e" opacity="0.8"/>
  <!-- Tree 3 highlight -->
  <ellipse cx="614" cy="450" rx="24" ry="20" fill="#5ec874" opacity="0.36"/>

  <!-- Tree 4 trunk -->
  <rect x="710" y="565" width="13" height="105" rx="5" fill="#4e3018" opacity="0.88"/>
  <!-- Tree 4 canopy -->
  <ellipse cx="716" cy="514" rx="62" ry="58" fill="#2d6c3e" opacity="0.82"/>
  <ellipse cx="716" cy="492" rx="50" ry="46" fill="#389450" opacity="0.85"/>
  <ellipse cx="704" cy="474" rx="36" ry="32" fill="#42aa5c" opacity="0.8"/>
  <ellipse cx="726" cy="480" rx="30" ry="26" fill="#4ebe68" opacity="0.75"/>

  <!-- Foreground vegetation clusters -->
  <!-- Left foreground ferns/bushes -->
  <ellipse cx="50" cy="720" rx="90" ry="55" fill="#266232" opacity="0.88"/>
  <ellipse cx="30" cy="700" rx="65" ry="42" fill="#2e7a3c" opacity="0.85"/>
  <ellipse cx="90" cy="695" rx="55" ry="38" fill="#348a44" opacity="0.8"/>
  <!-- Left fern fronds -->
  <path d="M 40,680 Q 20,650 10,620" stroke="#3a9050" stroke-width="4" fill="none" opacity="0.7"/>
  <path d="M 55,675 Q 45,640 50,605" stroke="#3a9050" stroke-width="3.5" fill="none" opacity="0.65"/>
  <path d="M 70,670 Q 80,638 90,608" stroke="#3a9050" stroke-width="3" fill="none" opacity="0.6"/>

  <!-- Right foreground vegetation -->
  <ellipse cx="758" cy="715" rx="88" ry="52" fill="#245e30" opacity="0.88"/>
  <ellipse cx="780" cy="695" rx="64" ry="40" fill="#2c7638" opacity="0.85"/>
  <ellipse cx="728" cy="700" rx="52" ry="36" fill="#328640" opacity="0.8"/>
  <!-- Right fern fronds -->
  <path d="M 760,678 Q 780,648 792,618" stroke="#38884a" stroke-width="4" fill="none" opacity="0.7"/>
  <path d="M 745,675 Q 756,640 750,608" stroke="#38884a" stroke-width="3.5" fill="none" opacity="0.65"/>
  <path d="M 730,672 Q 718,640 710,612" stroke="#38884a" stroke-width="3" fill="none" opacity="0.6"/>

  <!-- Ground cover moss/grass textures -->
  <ellipse cx="260" cy="740" rx="120" ry="45" fill="#316638" opacity="0.6"/>
  <ellipse cx="540" cy="745" rx="115" ry="42" fill="#2e6035" opacity="0.58"/>
  <ellipse cx="400" cy="760" rx="95" ry="35" fill="#2c5e32" opacity="0.55"/>

  <!-- Small rocks -->
  <ellipse cx="290" cy="648" rx="18" ry="12" fill="#5a6050" opacity="0.72"/>
  <ellipse cx="320" cy="658" rx="14" ry="9" fill="#50583e" opacity="0.68"/>
  <ellipse cx="510" cy="652" rx="16" ry="10" fill="#546254" opacity="0.7"/>
  <ellipse cx="480" cy="644" rx="12" ry="8" fill="#4c5a48" opacity="0.65"/>

  <!-- Atmospheric depth haze at bottom -->
  <rect x="0" y="750" width="800" height="150" fill="#1e3320" opacity="0.45"/>

  <!-- Center glow overlay for board zone -->
  <rect width="800" height="900" fill="url(#s1-glow-center)"/>
</svg>
