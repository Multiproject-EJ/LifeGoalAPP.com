<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 900" preserveAspectRatio="xMidYMid slice">
  <defs>
    <!-- Scene 2: Coastal blue/olive — beach + palms -->
    <radialGradient id="s2-sky" cx="48%" cy="28%" r="72%">
      <stop offset="0%" stop-color="#71d6ea"/>
      <stop offset="30%" stop-color="#4ea6db"/>
      <stop offset="65%" stop-color="#3a85b0"/>
      <stop offset="100%" stop-color="#26607a"/>
    </radialGradient>
    <radialGradient id="s2-ground" cx="50%" cy="95%" r="70%">
      <stop offset="0%" stop-color="#7f8f4d"/>
      <stop offset="35%" stop-color="#5d6b3f"/>
      <stop offset="70%" stop-color="#4a5430"/>
      <stop offset="100%" stop-color="#2e3a20"/>
    </radialGradient>
    <radialGradient id="s2-sea" cx="50%" cy="50%" r="55%">
      <stop offset="0%" stop-color="#4ab8d8" stop-opacity="0.9"/>
      <stop offset="55%" stop-color="#2e8aaa" stop-opacity="0.88"/>
      <stop offset="100%" stop-color="#1a607c" stop-opacity="0.85"/>
    </radialGradient>
    <radialGradient id="s2-sea-sheen" cx="35%" cy="35%" r="40%">
      <stop offset="0%" stop-color="#b0e8f4" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#4ab8d8" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="s2-glow-center" cx="50%" cy="44%" r="40%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <filter id="blur-soft2">
      <feGaussianBlur stdDeviation="6"/>
    </filter>
    <filter id="blur-light2">
      <feGaussianBlur stdDeviation="3"/>
    </filter>
  </defs>

  <!-- Sky -->
  <rect width="800" height="900" fill="url(#s2-sky)"/>

  <!-- Ground base -->
  <rect width="800" height="900" fill="url(#s2-ground)" opacity="0.68"/>

  <!-- Distant coastal hills -->
  <ellipse cx="180" cy="470" rx="280" ry="105" fill="#4a6838" opacity="0.52" filter="url(#blur-soft2)"/>
  <ellipse cx="620" cy="478" rx="250" ry="98" fill="#45603a" opacity="0.50" filter="url(#blur-soft2)"/>
  <ellipse cx="400" cy="455" rx="320" ry="115" fill="#52724a" opacity="0.42" filter="url(#blur-soft2)"/>

  <!-- Ground terrain -->
  <ellipse cx="400" cy="830" rx="500" ry="210" fill="#2e3a20"/>
  <ellipse cx="130" cy="795" rx="230" ry="148" fill="#3a4828"/>
  <ellipse cx="670" cy="800" rx="218" ry="136" fill="#384428"/>

  <!-- Coastal sea inlet -->
  <ellipse cx="400" cy="555" rx="185" ry="95" fill="url(#s2-sea)"/>
  <ellipse cx="400" cy="555" rx="185" ry="95" fill="url(#s2-sea-sheen)"/>
  <!-- Wave lines -->
  <path d="M 248,545 Q 280,535 320,545 Q 360,555 400,545 Q 440,535 480,545 Q 520,555 552,545" fill="none" stroke="rgba(160,230,248,0.3)" stroke-width="2.5"/>
  <path d="M 262,562 Q 295,550 335,562 Q 375,572 415,562 Q 455,550 492,562 Q 528,572 538,562" fill="none" stroke="rgba(160,230,248,0.22)" stroke-width="2"/>
  <!-- Sandy shore around sea -->
  <ellipse cx="400" cy="560" rx="215" ry="112" fill="none" stroke="#c8a858" stroke-width="8" opacity="0.55"/>
  <ellipse cx="400" cy="562" rx="224" ry="118" fill="#c8a858" opacity="0.22"/>

  <!-- Palm trees - left -->
  <!-- Palm 1 trunk (curved) -->
  <path d="M 80,680 Q 92,620 105,555 Q 110,530 115,510" stroke="#7a5028" stroke-width="12" fill="none" stroke-linecap="round" opacity="0.9"/>
  <!-- Palm 1 fronds -->
  <path d="M 115,510 Q 80,480 50,468" stroke="#5a8030" stroke-width="5" fill="none" stroke-linecap="round" opacity="0.85"/>
  <path d="M 115,510 Q 100,472 95,452" stroke="#5a8030" stroke-width="5" fill="none" stroke-linecap="round" opacity="0.85"/>
  <path d="M 115,510 Q 128,468 140,452" stroke="#5a8030" stroke-width="4.5" fill="none" stroke-linecap="round" opacity="0.8"/>
  <path d="M 115,510 Q 140,480 162,475" stroke="#5a8030" stroke-width="4.5" fill="none" stroke-linecap="round" opacity="0.8"/>
  <path d="M 115,510 Q 148,498 168,508" stroke="#5a8030" stroke-width="4" fill="none" stroke-linecap="round" opacity="0.75"/>
  <!-- Palm frond leaves (elliptical blobs) -->
  <ellipse cx="56" cy="465" rx="28" ry="10" fill="#5a8030" opacity="0.75" transform="rotate(-25 56 465)"/>
  <ellipse cx="97" cy="450" rx="26" ry="9" fill="#628840" opacity="0.72" transform="rotate(-10 97 450)"/>
  <ellipse cx="136" cy="450" rx="26" ry="9" fill="#5a8030" opacity="0.72" transform="rotate(18 136 450)"/>
  <ellipse cx="160" cy="472" rx="22" ry="8" fill="#628840" opacity="0.7" transform="rotate(30 160 472)"/>
  <ellipse cx="165" cy="506" rx="20" ry="7" fill="#5a8030" opacity="0.68" transform="rotate(42 165 506)"/>

  <!-- Palm 2 trunk -->
  <path d="M 165,670 Q 172,605 178,560 Q 180,540 182,520" stroke="#6e4820" stroke-width="10" fill="none" stroke-linecap="round" opacity="0.88"/>
  <!-- Palm 2 fronds -->
  <path d="M 182,520 Q 148,494 122,484" stroke="#527828" stroke-width="4.5" fill="none" stroke-linecap="round" opacity="0.8"/>
  <path d="M 182,520 Q 170,488 165,470" stroke="#527828" stroke-width="4.5" fill="none" stroke-linecap="round" opacity="0.8"/>
  <path d="M 182,520 Q 196,484 205,470" stroke="#527828" stroke-width="4" fill="none" stroke-linecap="round" opacity="0.78"/>
  <path d="M 182,520 Q 208,492 224,490" stroke="#527828" stroke-width="4" fill="none" stroke-linecap="round" opacity="0.75"/>
  <ellipse cx="128" cy="482" rx="24" ry="9" fill="#527828" opacity="0.72" transform="rotate(-22 128 482)"/>
  <ellipse cx="166" cy="468" rx="22" ry="8" fill="#5a8030" opacity="0.7" transform="rotate(-6 166 468)"/>
  <ellipse cx="202" cy="468" rx="22" ry="8" fill="#527828" opacity="0.7" transform="rotate(20 202 468)"/>
  <ellipse cx="222" cy="489" rx="18" ry="7" fill="#5a8030" opacity="0.68" transform="rotate(36 222 489)"/>

  <!-- Palm trees - right -->
  <!-- Palm 3 trunk -->
  <path d="M 720,675 Q 706,608 695,562 Q 690,538 688,516" stroke="#7a5028" stroke-width="12" fill="none" stroke-linecap="round" opacity="0.9"/>
  <!-- Palm 3 fronds -->
  <path d="M 688,516 Q 722,488 750,476" stroke="#5a8030" stroke-width="5" fill="none" stroke-linecap="round" opacity="0.85"/>
  <path d="M 688,516 Q 700,478 704,458" stroke="#5a8030" stroke-width="5" fill="none" stroke-linecap="round" opacity="0.85"/>
  <path d="M 688,516 Q 674,474 664,458" stroke="#5a8030" stroke-width="4.5" fill="none" stroke-linecap="round" opacity="0.8"/>
  <path d="M 688,516 Q 660,484 640,480" stroke="#5a8030" stroke-width="4.5" fill="none" stroke-linecap="round" opacity="0.8"/>
  <path d="M 688,516 Q 652,502 634,512" stroke="#5a8030" stroke-width="4" fill="none" stroke-linecap="round" opacity="0.75"/>
  <ellipse cx="746" cy="473" rx="28" ry="10" fill="#5a8030" opacity="0.75" transform="rotate(22 746 473)"/>
  <ellipse cx="703" cy="456" rx="26" ry="9" fill="#628840" opacity="0.72" transform="rotate(8 703 456)"/>
  <ellipse cx="666" cy="456" rx="26" ry="9" fill="#5a8030" opacity="0.72" transform="rotate(-18 666 456)"/>
  <ellipse cx="641" cy="478" rx="22" ry="8" fill="#628840" opacity="0.7" transform="rotate(-32 641 478)"/>
  <ellipse cx="636" cy="510" rx="20" ry="7" fill="#5a8030" opacity="0.68" transform="rotate(-44 636 510)"/>

  <!-- Palm 4 trunk -->
  <path d="M 638,665 Q 630,600 625,556 Q 622,536 620,516" stroke="#6e4820" stroke-width="10" fill="none" stroke-linecap="round" opacity="0.88"/>
  <!-- Palm 4 fronds -->
  <path d="M 620,516 Q 654,492 680,482" stroke="#527828" stroke-width="4.5" fill="none" stroke-linecap="round" opacity="0.8"/>
  <path d="M 620,516 Q 632,480 636,462" stroke="#527828" stroke-width="4.5" fill="none" stroke-linecap="round" opacity="0.8"/>
  <path d="M 620,516 Q 606,480 596,466" stroke="#527828" stroke-width="4" fill="none" stroke-linecap="round" opacity="0.78"/>
  <path d="M 620,516 Q 594,490 576,488" stroke="#527828" stroke-width="4" fill="none" stroke-linecap="round" opacity="0.75"/>
  <ellipse cx="676" cy="480" rx="24" ry="9" fill="#527828" opacity="0.72" transform="rotate(24 676 480)"/>
  <ellipse cx="636" cy="460" rx="22" ry="8" fill="#5a8030" opacity="0.7" transform="rotate(5 636 460)"/>
  <ellipse cx="596" cy="464" rx="22" ry="8" fill="#527828" opacity="0.7" transform="rotate(-20 596 464)"/>
  <ellipse cx="578" cy="487" rx="18" ry="7" fill="#5a8030" opacity="0.68" transform="rotate(-36 578 487)"/>

  <!-- Coastal rocks / boulders -->
  <ellipse cx="250" cy="640" rx="32" ry="20" fill="#7a7060" opacity="0.78"/>
  <ellipse cx="270" cy="652" rx="22" ry="14" fill="#8a8070" opacity="0.72"/>
  <ellipse cx="234" cy="648" rx="18" ry="12" fill="#706858" opacity="0.7"/>
  <ellipse cx="550" cy="638" rx="30" ry="18" fill="#7a7060" opacity="0.76"/>
  <ellipse cx="530" cy="650" rx="20" ry="13" fill="#8a8070" opacity="0.7"/>
  <ellipse cx="568" cy="646" rx="16" ry="10" fill="#706858" opacity="0.68"/>

  <!-- Foreground beach grass / coastal shrubs -->
  <ellipse cx="50" cy="740" rx="85" ry="48" fill="#4a5830" opacity="0.85"/>
  <ellipse cx="28" cy="722" rx="60" ry="38" fill="#567038" opacity="0.82"/>
  <path d="M 40,705 Q 22,675 14,645" stroke="#567838" stroke-width="3.5" fill="none" opacity="0.65"/>
  <path d="M 54,702 Q 48,668 52,638" stroke="#567838" stroke-width="3" fill="none" opacity="0.6"/>
  <path d="M 68,698 Q 78,664 88,636" stroke="#567838" stroke-width="3" fill="none" opacity="0.58"/>

  <ellipse cx="752" cy="738" rx="82" ry="46" fill="#485630" opacity="0.85"/>
  <ellipse cx="776" cy="720" rx="58" ry="36" fill="#546e38" opacity="0.82"/>
  <path d="M 760,702 Q 778,670 786,640" stroke="#547438" stroke-width="3.5" fill="none" opacity="0.65"/>
  <path d="M 746,700 Q 740,666 744,636" stroke="#547438" stroke-width="3" fill="none" opacity="0.6"/>
  <path d="M 732,697 Q 722,662 712,634" stroke="#547438" stroke-width="3" fill="none" opacity="0.58"/>

  <!-- Bottom depth -->
  <rect x="0" y="760" width="800" height="140" fill="#2e3a20" opacity="0.42"/>

  <!-- Center glow overlay -->
  <rect width="800" height="900" fill="url(#s2-glow-center)"/>
</svg>
