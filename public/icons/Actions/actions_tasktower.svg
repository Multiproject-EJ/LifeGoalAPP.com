<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="tt-sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#4d9fdd"/>
      <stop offset="0.6" stop-color="#a3d2f2"/>
      <stop offset="1" stop-color="#dceefb"/>
    </linearGradient>
    <linearGradient id="tt-brick" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#e05a47"/>
      <stop offset="1" stop-color="#ab2f22"/>
    </linearGradient>
    <linearGradient id="tt-glass" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#3cd69c"/>
      <stop offset="1" stop-color="#0b7f5c"/>
    </linearGradient>
    <linearGradient id="tt-wood" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f0ad48"/>
      <stop offset="1" stop-color="#b87413"/>
    </linearGradient>
    <linearGradient id="tt-ground" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#8a8a96"/>
      <stop offset="1" stop-color="#3d3d47"/>
    </linearGradient>
    <clipPath id="tt-frame">
      <rect x="1" y="1" width="62" height="62" rx="14"/>
    </clipPath>
  </defs>

  <g clip-path="url(#tt-frame)">
    <!-- sky backdrop -->
    <rect x="1" y="1" width="62" height="62" fill="url(#tt-sky)"/>

    <!-- sun -->
    <circle cx="50" cy="14" r="8" fill="#ffe08a" opacity="0.35"/>
    <circle cx="50" cy="14" r="5" fill="#ffe08a"/>

    <!-- clouds -->
    <ellipse cx="15" cy="12" rx="6" ry="2.6" fill="#ffffff" opacity="0.85"/>
    <ellipse cx="24" cy="17" rx="4.5" ry="2" fill="#ffffff" opacity="0.65"/>

    <!-- skyline silhouettes -->
    <g fill="#7591ab" opacity="0.75">
      <rect x="3" y="36" width="8" height="21"/>
      <rect x="49" y="40" width="8" height="17"/>
      <rect x="55" y="34" width="6" height="23"/>
    </g>

    <!-- crane -->
    <rect x="8" y="6" width="40" height="3.2" rx="1.2" fill="#e3a41f"/>
    <rect x="30" y="9" width="2" height="6" fill="#454b57"/>
    <circle cx="31" cy="17" r="2.2" fill="none" stroke="#59606e" stroke-width="1.6"/>

    <!-- tower: glass base, timber middle, brick crown -->
    <g stroke="#00000033" stroke-width="0.8">
      <rect x="14" y="49" width="17" height="7" rx="1" fill="url(#tt-glass)"/>
      <rect x="33" y="49" width="17" height="7" rx="1" fill="url(#tt-glass)"/>
      <rect x="14" y="41" width="11" height="7" rx="1" fill="url(#tt-wood)"/>
      <rect x="27" y="41" width="11" height="7" rx="1" fill="url(#tt-wood)"/>
      <rect x="40" y="41" width="10" height="7" rx="1" fill="url(#tt-wood)"/>
      <rect x="14" y="33" width="27" height="7" rx="1" fill="url(#tt-brick)"/>
      <rect x="43" y="33" width="7" height="7" rx="1" fill="url(#tt-wood)"/>
      <rect x="14" y="25" width="27" height="7" rx="1" fill="url(#tt-brick)"/>
    </g>

    <!-- block highlights -->
    <g fill="#ffffff" opacity="0.3">
      <rect x="15" y="50" width="15" height="1.4" rx="0.7"/>
      <rect x="34" y="50" width="15" height="1.4" rx="0.7"/>
      <rect x="15" y="42" width="9" height="1.4" rx="0.7"/>
      <rect x="15" y="34" width="25" height="1.4" rx="0.7"/>
      <rect x="15" y="26" width="25" height="1.4" rx="0.7"/>
    </g>

    <!-- ground: sidewalk + asphalt -->
    <rect x="1" y="56" width="62" height="2.5" fill="#8a8a96"/>
    <rect x="1" y="58.5" width="62" height="4.5" fill="url(#tt-ground)"/>
  </g>

  <!-- frame stroke -->
  <rect x="1" y="1" width="62" height="62" rx="14" fill="none" stroke="#00000022" stroke-width="1"/>
</svg>
