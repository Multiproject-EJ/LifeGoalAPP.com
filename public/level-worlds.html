<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Level Worlds</title>
    <style>
      :root {
        color-scheme: dark;
        --glow: #3bff6f;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        font-family: Inter, Arial, sans-serif;
        background: #061320;
        min-height: 100vh;
      }
      .level-screen {
        position: relative;
        min-height: 100vh;
        display: grid;
        place-items: center;
        overflow: hidden;
      }
      .level-bg {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
        object-fit: cover;
      }
      .hud {
        position: absolute;
        top: 20px;
        left: 20px;
        right: 20px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        z-index: 4;
      }
      .level-pill {
        padding: 10px 16px;
        border-radius: 999px;
        background: rgba(0, 0, 0, 0.5);
        border: 1px solid rgba(255,255,255,0.3);
        font-weight: 700;
        letter-spacing: 0.05em;
      }
      .exit-btn {
        width: 52px;
        height: 52px;
        border-radius: 999px;
        border: 2px solid #fff;
        background: rgba(0,0,0,0.55);
        color: #fff;
        font-size: 1.4rem;
        cursor: pointer;
      }
      .island-wrap {
        position: relative;
        width: min(1100px, 94vw);
        aspect-ratio: 16 / 9;
        z-index: 3;
      }
      #landmarksLayer {
        position: absolute;
        inset: 0;
      }
      #gridLayer {
        position: absolute;
        inset: 0;
        pointer-events: none;
        z-index: 0;
        display: none;
      }
      .island-wrap--debug #gridLayer {
        display: block;
      }
      .grid-line {
        position: absolute;
        background: rgba(255, 255, 255, 0.18);
      }
      .grid-line--v {
        top: 0;
        bottom: 0;
        width: 1px;
      }
      .grid-line--h {
        left: 0;
        right: 0;
        height: 1px;
      }
      .landmark-label {
        position: absolute;
        transform: translate(-50%, -185%);
        padding: 2px 6px;
        border-radius: 6px;
        font-size: 11px;
        font-weight: 700;
        color: #eaffff;
        background: rgba(0, 0, 0, 0.55);
        border: 1px solid rgba(255, 255, 255, 0.35);
        pointer-events: none;
      }
      .landmark {
        position: absolute;
        width: 30px;
        height: 30px;
        border-radius: 999px;
        border: 2px solid #fff;
        background: radial-gradient(circle at 30% 30%, #fff, #9fffd1 28%, #24c45f 100%);
        box-shadow: 0 0 10px #3bff6f, 0 0 24px rgba(59,255,111,0.8);
        cursor: pointer;
      }
      .landmark:hover { transform: translate(-50%, -50%) scale(1.08); }
      .hint {
        position: absolute;
        bottom: 16px;
        left: 50%;
        transform: translateX(-50%);
        background: rgba(0,0,0,0.5);
        padding: 10px 14px;
        border-radius: 10px;
        font-size: 0.9rem;
        z-index: 4;
      }
      .metrics-panel {
        position: absolute;
        right: 16px;
        bottom: 16px;
        z-index: 5;
        width: min(360px, 92vw);
        max-height: 38vh;
        overflow: auto;
        padding: 10px;
        border-radius: 10px;
        border: 1px solid rgba(255,255,255,0.3);
        background: rgba(0, 0, 0, 0.72);
        font-size: 12px;
        line-height: 1.3;
        display: none;
      }
      .metrics-panel table {
        width: 100%;
        border-collapse: collapse;
      }
      .metrics-panel th,
      .metrics-panel td {
        text-align: left;
        padding: 4px 6px;
        border-bottom: 1px solid rgba(255,255,255,0.12);
        white-space: nowrap;
      }
      .metrics-panel th {
        color: #8ef9ff;
        font-weight: 700;
      }
      .metrics-panel tr:last-child td {
        border-bottom: 0;
      }
    </style>
  </head>
  <body>
    <main class="level-screen">
      <img id="levelBg" class="level-bg" src="/level-worlds/assets/level-bg-01.webp" alt="Level background" />
      <div class="hud">
        <div id="levelLabel" class="level-pill">LEVEL 1</div>
        <button class="exit-btn" id="exitBtn" aria-label="Exit level map">✕</button>
      </div>
      <section id="routeStage" class="island-wrap" aria-label="Level route">
        <div id="gridLayer" aria-hidden="true"></div>
        <div id="landmarksLayer" aria-label="Landmarks"></div>
      </section>
      <div class="hint">Click any glowing stop to move to the next level. End loops back to Level 1.</div>
      <aside id="metricsPanel" class="metrics-panel" aria-live="polite"></aside>
    </main>

    <script>
      const levels = [
        { background: '/level-worlds/assets/level-bg-01.webp' },
        { background: '/level-worlds/assets/level-bg-02.webp' },
        { background: '/level-worlds/assets/level-bg-03.webp' },
        { background: '/level-worlds/assets/level-bg-04.webp' },
        { background: '/level-worlds/assets/level-bg-05.webp' },
        { background: '/level-worlds/assets/level-bg-06.webp' },
        { background: '/level-worlds/assets/level-bg-07.webp' }
      ];

      // Coordinates are in percentage of the level stage: x (left→right), y (top→bottom).
      // Strategy: tune one shared base route, then apply tiny per-level offsets.
      // Dot 1 is intentionally fixed at (31,62) per review feedback.
      const baseRoute = [
        { x: 31, y: 62 },
        { x: 43, y: 56 },
        { x: 54, y: 54 },
        { x: 64, y: 56 },
        { x: 69, y: 62 }
      ];

      const routeOffsets = [
        { x: 0, y: 0 },
        { x: -1, y: 1 },
        { x: 1, y: -1 },
        { x: 0, y: 0 },
        { x: -1, y: 1 },
        { x: 1, y: -1 },
        { x: 0, y: 0 }
      ];

      const routes = routeOffsets.map((offset) =>
        baseRoute.map((point, index) => {
          if (index === 0) {
            return point;
          }
          return {
            x: point.x + offset.x,
            y: point.y + offset.y,
          };
        })
      );
      const requestedLevel = Number.parseInt(new URLSearchParams(window.location.search).get('level') || '1', 10);
      let level = Number.isNaN(requestedLevel) ? 0 : Math.min(levels.length - 1, Math.max(0, requestedLevel - 1));
      const bg = document.getElementById('levelBg');
      const label = document.getElementById('levelLabel');
      const routeStage = document.getElementById('routeStage');
      const gridLayer = document.getElementById('gridLayer');
      const landmarksLayer = document.getElementById('landmarksLayer');
      const metricsPanel = document.getElementById('metricsPanel');
      const debugGrid = new URLSearchParams(window.location.search).get('debug') === 'grid';

      const renderGrid = () => {
        if (!debugGrid) return;
        routeStage.classList.add('island-wrap--debug');
        gridLayer.innerHTML = '';
        for (let tick = 10; tick < 100; tick += 10) {
          const v = document.createElement('div');
          v.className = 'grid-line grid-line--v';
          v.style.left = `${tick}%`;
          gridLayer.appendChild(v);
          const h = document.createElement('div');
          h.className = 'grid-line grid-line--h';
          h.style.top = `${tick}%`;
          gridLayer.appendChild(h);
        }
      };

      const renderLandmarks = () => {
        const route = routes[level] ?? routes[0];
        landmarksLayer.innerHTML = '';
        route.forEach((stop, index) => {
          const button = document.createElement('button');
          button.type = 'button';
          button.className = 'landmark';
          button.style.left = `${stop.x}%`;
          button.style.top = `${stop.y}%`;
          button.style.transform = 'translate(-50%, -50%)';
          button.setAttribute('aria-label', `Landmark ${index + 1}`);
          if (debugGrid) {
            const dotLabel = document.createElement('span');
            dotLabel.className = 'landmark-label';
            dotLabel.textContent = `${index + 1}: ${stop.x},${stop.y}`;
            button.appendChild(dotLabel);
          }
          button.addEventListener('click', () => {
            level = (level + 1) % levels.length;
            update();
          });
          landmarksLayer.appendChild(button);
        });
        return route;
      };

      const renderMetrics = (route) => {
        if (!debugGrid) {
          metricsPanel.style.display = 'none';
          return;
        }

        const stageRect = routeStage.getBoundingClientRect();
        const dots = landmarksLayer.querySelectorAll('.landmark');
        const rows = [];

        dots.forEach((dot, index) => {
          const rect = dot.getBoundingClientRect();
          const measuredX = (((rect.left + rect.width / 2) - stageRect.left) / stageRect.width) * 100;
          const measuredY = (((rect.top + rect.height / 2) - stageRect.top) / stageRect.height) * 100;
          const target = route[index];
          rows.push(`
            <tr>
              <td>${index + 1}</td>
              <td>${target.x.toFixed(1)}, ${target.y.toFixed(1)}</td>
              <td>${measuredX.toFixed(1)}, ${measuredY.toFixed(1)}</td>
              <td>${(measuredX - target.x).toFixed(2)}, ${(measuredY - target.y).toFixed(2)}</td>
            </tr>
          `);
        });

        metricsPanel.innerHTML = `
          <strong>Dot Position Audit (Level ${level + 1})</strong>
          <table>
            <thead>
              <tr>
                <th>#</th>
                <th>Target % (x,y)</th>
                <th>Measured % (x,y)</th>
                <th>Delta % (x,y)</th>
              </tr>
            </thead>
            <tbody>${rows.join('')}</tbody>
          </table>
        `;
        metricsPanel.style.display = 'block';
      };

      const update = () => {
        bg.src = levels[level].background;
        label.textContent = `LEVEL ${level + 1} / ${levels.length}`;
        renderGrid();
        const route = renderLandmarks();
        requestAnimationFrame(() => renderMetrics(route));
      };
      document.getElementById('exitBtn').addEventListener('click', () => {
        if (window.history.length > 1) {
          window.close();
        }
        window.location.href = '/';
      });
      update();
    </script>
  </body>
</html>
