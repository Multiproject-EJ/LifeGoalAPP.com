<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Level Worlds</title>
    <style>
      :root {
        color-scheme: dark;
        --glow: #3bff6f;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        font-family: Inter, Arial, sans-serif;
        background: #061320;
        min-height: 100vh;
      }
      .level-screen {
        position: relative;
        min-height: 100vh;
        display: grid;
        place-items: center;
        overflow: hidden;
      }
      .level-bg {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
        object-fit: cover;
      }
      .hud {
        position: absolute;
        top: 20px;
        left: 20px;
        right: 20px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        z-index: 4;
      }
      .level-pill {
        padding: 10px 16px;
        border-radius: 999px;
        background: rgba(0, 0, 0, 0.5);
        border: 1px solid rgba(255,255,255,0.3);
        font-weight: 700;
        letter-spacing: 0.05em;
      }
      .exit-btn {
        width: 52px;
        height: 52px;
        border-radius: 999px;
        border: 2px solid #fff;
        background: rgba(0,0,0,0.55);
        color: #fff;
        font-size: 1.4rem;
        cursor: pointer;
      }
      .island-wrap {
        position: relative;
        width: min(1100px, 94vw);
        aspect-ratio: 16 / 9;
        z-index: 3;
      }
      #landmarksLayer {
        position: absolute;
        inset: 0;
      }
      .landmark {
        position: absolute;
        width: 30px;
        height: 30px;
        border-radius: 999px;
        border: 2px solid #fff;
        background: radial-gradient(circle at 30% 30%, #fff, #9fffd1 28%, #24c45f 100%);
        box-shadow: 0 0 10px #3bff6f, 0 0 24px rgba(59,255,111,0.8);
        cursor: pointer;
      }
      .landmark:hover { transform: translate(-50%, -50%) scale(1.08); }
      .hint {
        position: absolute;
        bottom: 16px;
        left: 50%;
        transform: translateX(-50%);
        background: rgba(0,0,0,0.5);
        padding: 10px 14px;
        border-radius: 10px;
        font-size: 0.9rem;
        z-index: 4;
      }
    </style>
  </head>
  <body>
    <main class="level-screen">
      <img id="levelBg" class="level-bg" src="/level-worlds/assets/level-bg-01.webp" alt="Level background" />
      <div class="hud">
        <div id="levelLabel" class="level-pill">LEVEL 1</div>
        <button class="exit-btn" id="exitBtn" aria-label="Exit level map">✕</button>
      </div>
      <section class="island-wrap" aria-label="Level route">
        <div id="landmarksLayer" aria-label="Landmarks"></div>
      </section>
      <div class="hint">Click any glowing stop to move to the next level. End loops back to Level 1.</div>
    </main>

    <script>
      const levels = [
        { background: '/level-worlds/assets/level-bg-01.webp' },
        { background: '/level-worlds/assets/level-bg-02.webp' },
        { background: '/level-worlds/assets/level-bg-03.webp' },
        { background: '/level-worlds/assets/level-bg-04.webp' },
        { background: '/level-worlds/assets/level-bg-05.webp' },
        { background: '/level-worlds/assets/level-bg-06.webp' },
        { background: '/level-worlds/assets/level-bg-07.webp' }
      ];

      const routes = [
        [
          { x: 29, y: 66 },
          { x: 36, y: 58 },
          { x: 45, y: 53 },
          { x: 56, y: 53 },
          { x: 65, y: 58 },
          { x: 72, y: 65 }
        ],
        [
          { x: 28, y: 67 },
          { x: 37, y: 59 },
          { x: 46, y: 54 },
          { x: 57, y: 54 },
          { x: 66, y: 59 },
          { x: 73, y: 66 }
        ],
        [
          { x: 27, y: 65 },
          { x: 36, y: 57 },
          { x: 45, y: 51 },
          { x: 55, y: 51 },
          { x: 64, y: 56 },
          { x: 72, y: 64 }
        ],
        [
          { x: 30, y: 66 },
          { x: 39, y: 58 },
          { x: 48, y: 52 },
          { x: 58, y: 52 },
          { x: 67, y: 58 },
          { x: 74, y: 66 }
        ],
        [
          { x: 28, y: 66 },
          { x: 37, y: 57 },
          { x: 46, y: 51 },
          { x: 56, y: 51 },
          { x: 65, y: 57 },
          { x: 73, y: 66 }
        ],
        [
          { x: 29, y: 65 },
          { x: 38, y: 56 },
          { x: 47, y: 50 },
          { x: 57, y: 50 },
          { x: 66, y: 56 },
          { x: 74, y: 64 }
        ],
        [
          { x: 28, y: 67 },
          { x: 36, y: 59 },
          { x: 45, y: 54 },
          { x: 55, y: 54 },
          { x: 64, y: 60 },
          { x: 72, y: 67 }
        ]
      ];
      const requestedLevel = Number.parseInt(new URLSearchParams(window.location.search).get('level') || '1', 10);
      let level = Number.isNaN(requestedLevel) ? 0 : Math.min(levels.length - 1, Math.max(0, requestedLevel - 1));
      const bg = document.getElementById('levelBg');
      const label = document.getElementById('levelLabel');
      const landmarksLayer = document.getElementById('landmarksLayer');

      const renderLandmarks = () => {
        const route = routes[level] ?? routes[0];
        landmarksLayer.innerHTML = '';
        route.forEach((stop, index) => {
          const button = document.createElement('button');
          button.type = 'button';
          button.className = 'landmark';
          button.style.left = `${stop.x}%`;
          button.style.top = `${stop.y}%`;
          button.style.transform = 'translate(-50%, -50%)';
          button.setAttribute('aria-label', `Landmark ${index + 1}`);
          button.addEventListener('click', () => {
            level = (level + 1) % levels.length;
            update();
          });
          landmarksLayer.appendChild(button);
        });
      };

      const update = () => {
        bg.src = levels[level].background;
        label.textContent = `LEVEL ${level + 1} / ${levels.length}`;
        renderLandmarks();
      };
      document.getElementById('exitBtn').addEventListener('click', () => {
        if (window.history.length > 1) {
          window.close();
        }
        window.location.href = '/';
      });
      update();
    </script>
  </body>
</html>
