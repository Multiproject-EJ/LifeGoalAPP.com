<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Level Worlds</title>
    <style>
      :root {
        color-scheme: dark;
        --glow: #3bff6f;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        font-family: Inter, Arial, sans-serif;
        background: #061320;
        min-height: 100vh;
      }
      .level-screen {
        position: relative;
        min-height: 100vh;
        display: grid;
        place-items: center;
        overflow: hidden;
      }
      .level-bg {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
        object-fit: cover;
      }
      .hud {
        position: absolute;
        top: 20px;
        left: 20px;
        right: 20px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        z-index: 4;
      }
      .level-pill {
        padding: 10px 16px;
        border-radius: 999px;
        background: rgba(0, 0, 0, 0.5);
        border: 1px solid rgba(255,255,255,0.3);
        font-weight: 700;
        letter-spacing: 0.05em;
      }
      .exit-btn {
        width: 52px;
        height: 52px;
        border-radius: 999px;
        border: 2px solid #fff;
        background: rgba(0,0,0,0.55);
        color: #fff;
        font-size: 1.4rem;
        cursor: pointer;
      }
      .island-wrap {
        position: relative;
        width: min(1100px, 94vw);
        aspect-ratio: 16 / 9;
        z-index: 3;
      }
      .island {
        position: absolute;
        left: 50%;
        bottom: 7%;
        transform: translateX(-50%);
        width: min(900px, 90vw);
      }
      .landmark {
        position: absolute;
        width: 38px;
        height: 38px;
        border-radius: 999px;
        border: 2px solid #fff;
        background: radial-gradient(circle at 30% 30%, #fff, #9fffd1 28%, #24c45f 100%);
        box-shadow: 0 0 10px #3bff6f, 0 0 24px rgba(59,255,111,0.8);
        cursor: pointer;
      }
      .landmark:hover { transform: scale(1.08); }
      .hint {
        position: absolute;
        bottom: 16px;
        left: 50%;
        transform: translateX(-50%);
        background: rgba(0,0,0,0.5);
        padding: 10px 14px;
        border-radius: 10px;
        font-size: 0.9rem;
        z-index: 4;
      }
    </style>
  </head>
  <body>
    <main class="level-screen">
      <img id="levelBg" class="level-bg" src="/level-worlds/assets/level-bg-01.svg" alt="Level background" />
      <div class="hud">
        <div id="levelLabel" class="level-pill">LEVEL 1</div>
        <button class="exit-btn" id="exitBtn" aria-label="Exit level map">✕</button>
      </div>
      <section class="island-wrap" aria-label="Island route">
        <img id="islandOverlay" class="island" src="/level-worlds/assets/island-overlay-01.svg" alt="Island" />
        <button class="landmark" style="left: 24%; bottom: 42%;" data-index="0" aria-label="Landmark 1"></button>
        <button class="landmark" style="left: 39%; bottom: 52%;" data-index="1" aria-label="Landmark 2"></button>
        <button class="landmark" style="left: 54%; bottom: 47%;" data-index="2" aria-label="Landmark 3"></button>
        <button class="landmark" style="left: 67%; bottom: 38%;" data-index="3" aria-label="Landmark 4"></button>
      </section>
      <div class="hint">Click any glowing stop to move to the next level. End loops back to Level 1.</div>
    </main>

    <script>
      const levels = [
        {
          background: '/level-worlds/assets/level-bg-01.svg',
          island: '/level-worlds/assets/island-overlay-01.svg'
        },
        {
          background: '/level-worlds/assets/level-bg-02.svg',
          island: '/level-worlds/assets/island-overlay-01.svg'
        },
        {
          background: '/level-worlds/assets/level-bg-03.svg',
          island: '/level-worlds/assets/island-overlay-01.svg'
        }
      ];
      let level = 0;
      const bg = document.getElementById('levelBg');
      const island = document.getElementById('islandOverlay');
      const label = document.getElementById('levelLabel');
      const update = () => {
        bg.src = levels[level].background;
        island.src = levels[level].island;
        label.textContent = `LEVEL ${level + 1} / ${levels.length}`;
      };
      document.querySelectorAll('.landmark').forEach((button) => {
        button.addEventListener('click', () => {
          level = (level + 1) % levels.length;
          update();
        });
      });
      document.getElementById('exitBtn').addEventListener('click', () => {
        if (window.history.length > 1) {
          window.close();
        }
        window.location.href = '/';
      });
      update();
    </script>
  </body>
</html>
