<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Overlay Test</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            overflow: hidden;
        }

        /* Mobile Footer Nav - Positioned ABOVE overlay */
        .mobile-footer-nav {
            position: fixed;
            left: 0;
            right: 0;
            bottom: 0;
            z-index: 30; /* Above overlay */
            padding: 0.5rem 1rem;
            display: flex;
            justify-content: center;
        }

        .mobile-footer-nav__surface {
            width: 100%;
            max-width: 600px;
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.9), rgba(255, 255, 255, 0.7));
            border: 1px solid rgba(148, 163, 184, 0.3);
            border-radius: 18px;
            box-shadow: 0 14px 45px rgba(15, 23, 42, 0.18);
            padding: 0.6rem 1rem;
            display: flex;
            gap: 0.5rem;
        }

        .footer-btn {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.25rem;
            padding: 0.5rem;
            background: transparent;
            border: none;
            cursor: pointer;
            font-size: 0.75rem;
            color: #334155;
            transition: all 0.2s;
        }

        .footer-btn:hover {
            background: rgba(0, 0, 0, 0.05);
            border-radius: 8px;
        }

        .footer-icon {
            font-size: 1.5rem;
        }

        /* Game Board Overlay */
        .game-board-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 20; /* Below footer */
            display: none;
            flex-direction: column;
            opacity: 0;
            transition: opacity 400ms ease-out;
        }

        .game-board-overlay.open {
            display: flex;
            opacity: 1;
        }

        .game-board-overlay__backdrop {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.65); /* 10% more transparent */
            backdrop-filter: blur(4px);
            z-index: 25; /* Below footer */
        }

        .game-board-overlay__content {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 26; /* Below footer */
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
            align-items: center;
            padding-bottom: 80px;
            transform: translateY(100%);
            transition: transform 450ms cubic-bezier(0.23, 1, 0.32, 1);
            pointer-events: none;
        }

        .game-board-overlay.open .game-board-overlay__content {
            transform: translateY(0);
            pointer-events: auto;
        }

        /* Top Bar - Now matchbar at full width */
        .game-board-overlay__topbar {
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding: 0.5rem;
            cursor: pointer;
        }

        .game-board-overlay__topbar-bar {
            width: 100%;
            height: 40px;
            background: linear-gradient(135deg, #fbbf24, #f59e0b);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
            box-shadow: 0 4px 12px rgba(251, 191, 36, 0.3);
        }

        /* Secondary Bar - Previously topbar, now smaller */
        .game-board-overlay__secondarybar {
            width: 100%;
            display: flex;
            justify-content: center;
            padding: 0.5rem;
        }

        .game-board-overlay__secondarybar-bar {
            width: 70%;
            height: 60px;
            background: linear-gradient(135deg, #8b5cf6, #7c3aed);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
            box-shadow: 0 4px 12px rgba(139, 92, 246, 0.3);
        }

        /* Middle Section with Side Icons */
        .game-board-overlay__middle {
            flex: 1;
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            padding: 2rem 0.5rem 1rem;
            gap: 0.5rem;
        }

        .game-board-overlay__side-icons {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        .game-board-overlay__icon-placeholder {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: linear-gradient(135deg, #3b82f6, #1d4ed8);
            box-shadow: 0 4px 12px rgba(59, 130, 246, 0.3);
        }

        .game-board-overlay__icon-timer {
            font-size: 0.7rem;
            font-weight: 600;
            color: #e2e8f0;
            text-shadow: 0 1px 2px rgba(0, 0, 0, 0.5);
            text-align: center;
            margin-top: 0.25rem;
        }

        .game-board-overlay__icons-image {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, #ec4899, #db2777);
            border-radius: 12px;
            box-shadow: 0 4px 12px rgba(236, 72, 153, 0.3);
        }

        .open-overlay-btn {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            padding: 1rem 2rem;
            background: white;
            border: none;
            border-radius: 12px;
            font-size: 1.2rem;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.2);
            z-index: 10;
        }

        .status-text {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(255, 255, 255, 0.9);
            padding: 0.5rem 1rem;
            border-radius: 8px;
            font-weight: bold;
            z-index: 100;
        }
    </style>
</head>
<body>
    <div id="statusText" class="status-text">Click button to open overlay</div>

    <button class="open-overlay-btn" onclick="openOverlay()">Open Game Board Overlay</button>

    <!-- Game Board Overlay -->
    <div id="overlay" class="game-board-overlay">
        <div class="game-board-overlay__backdrop" onclick="closeOverlay()"></div>
        <div class="game-board-overlay__content">
            <!-- Top Bar - Now matchbar at full width -->
            <div class="game-board-overlay__topbar" onclick="handleTopBarClick()">
                <div class="game-board-overlay__topbar-bar">
                    TOP BAR (Click to open menu)
                </div>
            </div>

            <!-- Secondary Bar - Previously topbar, now smaller -->
            <div class="game-board-overlay__secondarybar">
                <div class="game-board-overlay__secondarybar-bar">
                    Secondary Bar (70% width)
                </div>
            </div>

            <!-- Middle Section with Side Icons -->
            <div class="game-board-overlay__middle">
                <!-- Left Side Icons -->
                <div class="game-board-overlay__side-icons">
                    <div>
                        <div class="game-board-overlay__icon-placeholder"></div>
                        <div class="game-board-overlay__icon-timer">1d 23m</div>
                    </div>
                    <div>
                        <div class="game-board-overlay__icon-placeholder"></div>
                        <div class="game-board-overlay__icon-timer">2h 15m</div>
                    </div>
                    <div>
                        <div class="game-board-overlay__icon-placeholder"></div>
                        <div class="game-board-overlay__icon-timer">45m</div>
                    </div>
                </div>

                <!-- Right Side Icons -->
                <div class="game-board-overlay__side-icons">
                    <div class="game-board-overlay__icons-image"></div>
                    <div class="game-board-overlay__icons-image"></div>
                    <div class="game-board-overlay__icons-image"></div>
                </div>
            </div>
        </div>
    </div>

    <!-- Mobile Footer Nav - ABOVE overlay -->
    <nav class="mobile-footer-nav">
        <div class="mobile-footer-nav__surface">
            <button class="footer-btn" onclick="handleFooterClick('energy')">
                <span class="footer-icon">⚡</span>
                <span>Energy</span>
            </button>
            <button class="footer-btn" onclick="handleFooterClick('score')">
                <span class="footer-icon">🏆</span>
                <span>Score</span>
            </button>
            <button class="footer-btn" onclick="handleFooterClick('game')">
                <span class="footer-icon">🎮</span>
                <span>Game</span>
            </button>
            <button class="footer-btn" onclick="handleFooterClick('habits')">
                <span class="footer-icon">✅</span>
                <span>Habits</span>
            </button>
            <button class="footer-btn" onclick="handleFooterClick('goals')">
                <span class="footer-icon">🎯</span>
                <span>Goals</span>
            </button>
        </div>
    </nav>

    <script>
        const overlay = document.getElementById('overlay');
        const statusText = document.getElementById('statusText');

        function openOverlay() {
            overlay.classList.add('open');
            statusText.textContent = 'Overlay open - Click footer buttons or backdrop to close';
        }

        function closeOverlay() {
            overlay.classList.remove('open');
            statusText.textContent = 'Overlay closed';
        }

        function handleTopBarClick() {
            alert('Game menu popup would open here!');
            statusText.textContent = 'Top bar clicked (opens game menu)';
        }

        function handleFooterClick(button) {
            // Close overlay when footer button is clicked
            if (overlay.classList.contains('open')) {
                closeOverlay();
                statusText.textContent = `${button} button clicked - Overlay closed`;
            } else {
                if (button === 'game') {
                    openOverlay();
                    statusText.textContent = 'Game button clicked - Overlay opened';
                } else {
                    statusText.textContent = `${button} button clicked`;
                }
            }
        }
    </script>
</body>
</html>
